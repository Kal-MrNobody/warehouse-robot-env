name: shatterdome-logistics-env
env_id: shatterdome-logistics-env
version: "1.0.0"
description: "Shatterdome Logistics Environment: An E-Commerce automated warehouse where logistics robots navigate, manage battery life, and complete package delivery orders."

author: "Warehouse Engineering"

server:
  port: 7860
  health_endpoint: /health

action_space:
  type: discrete
  values:
    - move_north
    - move_south
    - move_east
    - move_west
    - pickup_item
    - drop_item
    - recharge
    - done

observation_space:
  type: dict
  schema_endpoint: /schema

tasks:
  - id: task1_easy
    description: "Standard single package delivery in an open warehouse floor."
    max_steps: 25

  - id: task2_medium
    description: "Multi-package order. Internal structural hazards. Battery decay active."
    max_steps: 60

  - id: task3_hard
    description: "Dual robot deployment. Priority packages active. High battery decay and severe collision risks."
    max_steps: 100
