name: warehouse-robot-env
env_id: warehouse-robot-env
version: "0.1.0"
description: >
  A 2D grid-based warehouse simulator for training AI agents to pick and
  deliver items using reinforcement learning. Robots must navigate around
  shelves and walls, manage battery, avoid collisions, and complete orders
  before the step budget runs out. Inspired by real logistics challenges
  at companies running large-scale warehouse automation.
author: KalX0o
license: MIT
tags:
  - warehouse
  - robotics
  - logistics
  - reinforcement-learning
  - pick-and-place
  - battery-management
  - collision-avoidance
  - multi-step

tasks:
  - id: task1_easy
    description: "Single item pickup and delivery on a clear 10x10 grid"
    difficulty: easy
    max_steps: 25

  - id: task2_medium
    description: "Three items to deliver, static obstacles, battery drains each step"
    difficulty: medium
    max_steps: 60

  - id: task3_hard
    description: "Two robots, four items (two priority), must avoid robot-robot collisions"
    difficulty: hard
    max_steps: 100

action_space:
  type: discrete
  values:
    - move_north
    - move_south
    - move_east
    - move_west
    - pick_item
    - place_item
    - charge
    - done

observation_space:
  type: text
  description: "ASCII grid showing the warehouse + robot status + order list + valid actions"

reward:
  type: shaped
  range: [-2.0, 2.0]
  grader_score_range: [0.0, 1.0]

server:
  port: 7860
  health_endpoint: /health
