name: shatterdome-logistics-env
version: "1.0.0"
description: "Pan Pacific Defense Corps Shatterdome environment where Jaeger agents must secure and deploy Plasma Cores into Jaeger Bays."

author: "PPDC Engineering"

server:
  port: 7860
  health_endpoint: /health

action_space:
  type: discrete
  values:
    - move_north
    - move_south
    - move_east
    - move_west
    - load_core
    - deploy_core
    - recharge
    - done

observation_space:
  type: dict
  schema_endpoint: /schema

tasks:
  - id: task1_easy
    description: "Standard single core load. F-Stop conditions clear."
    max_steps: 25

  - id: task2_medium
    description: "Multi-core load. Internal structural hazards. Reactor decay active."
    max_steps: 60

  - id: task3_hard
    description: "Dual Jaeger deployment. Priority cores active. High reactor decay and severe collision risks."
    max_steps: 100
